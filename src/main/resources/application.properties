# ============================
# Server Configuration
# ============================
server.port=8080

# ============================
# MySQL Database Configuration
# ============================
# NOTE: For production, use environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bus_tracking_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Configuration
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================
# API Documentation (Swagger)
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================
# Application Info
# ============================
spring.application.name=Bus Tracking System

# ============================
# JWT Configuration
# ============================
# Secret key (Base64-encoded, min 256-bit for HS256)
# IMPORTANT: Override this in production via environment variable
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBidXMgdHJhY2tpbmcgand0IHRva2VuIGdlbmVyYXRpb24=}
# Token expiration: 24 hours (in milliseconds)
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ============================
# CORS Configuration
# ============================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
